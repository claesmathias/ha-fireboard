version: '3.8'

services:
  homeassistant:
    container_name: ha-fireboard-dev
    image: ghcr.io/home-assistant/home-assistant:stable
    volumes:
      # Home Assistant configuration
      - ./dev-config:/config
      # Mount our integration directly
      - ./custom_components/fireboard:/config/custom_components/fireboard:ro
    environment:
      - TZ=America/Los_Angeles
    restart: unless-stopped
    privileged: true
    # Note: network_mode: host doesn't work on macOS Docker
    # Using explicit port mapping instead
    ports:
      - "8123:8123"

# For development on macOS, we use explicit port mapping
# Home Assistant will be available at http://localhost:8123

